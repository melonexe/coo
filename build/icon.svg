<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- rounded-square app tile -->
  <rect x="8" y="8" width="496" height="496" rx="104" fill="#1b2130"/>
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="#3d7eff" stroke-opacity="0.35" stroke-width="8"/>

  <!-- tail -->
  <polygon points="150,300 48,392 84,296 140,272" fill="#6f81a0"/>

  <!-- legs -->
  <g stroke="#d97a52" stroke-width="14" stroke-linecap="round">
    <line x1="222" y1="372" x2="216" y2="416"/>
    <line x1="268" y1="376" x2="266" y2="418"/>
  </g>
  <g stroke="#d97a52" stroke-width="10" stroke-linecap="round">
    <line x1="216" y1="416" x2="196" y2="428"/>
    <line x1="216" y1="416" x2="228" y2="430"/>
    <line x1="266" y1="418" x2="248" y2="430"/>
    <line x1="266" y1="418" x2="280" y2="431"/>
  </g>

  <!-- body -->
  <ellipse cx="238" cy="298" rx="118" ry="88" fill="#a3b3cb"/>
  <!-- neck (same fill, merges body and head) -->
  <polygon points="278,232 348,238 330,304 256,292" fill="#a3b3cb"/>
  <!-- head -->
  <circle cx="336" cy="192" r="56" fill="#a3b3cb"/>

  <!-- iridescent neck patch -->
  <ellipse cx="312" cy="252" rx="34" ry="26" fill="#3fbf9f" opacity="0.6"/>
  <ellipse cx="320" cy="240" rx="22" ry="16" fill="#7e6fd8" opacity="0.4"/>

  <!-- wing -->
  <path d="M 148 274 Q 224 226 322 262 Q 292 336 204 348 Q 158 322 148 274 Z" fill="#7c8fae"/>
  <path d="M 190 300 Q 250 280 300 286" stroke="#6a7d9c" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M 196 324 Q 248 308 288 312" stroke="#6a7d9c" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- beak with cere -->
  <polygon points="386,186 424,200 384,214" fill="#c9865a"/>
  <circle cx="384" cy="190" r="9" fill="#e8edf5"/>

  <!-- eye -->
  <circle cx="350" cy="180" r="12" fill="#f5a83c"/>
  <circle cx="350" cy="180" r="6" fill="#1b2130"/>
</svg>
